<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – AI Research Assistant</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/auth.js"></script>
  <script>
    // Redirect logged in users
    requireGuest();
  </script>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span>AI Research Assistant</span>
        </a>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join us to study smarter and save time</p>
      </div>

      <form class="auth-form" id="signup-form">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" class="form-input" placeholder="Choose a username" required minlength="3">
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Log In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username').value.trim();
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value;
      const confirmPasswordInput = document.getElementById('confirm-password').value;
      
      if (passwordInput !== confirmPasswordInput) {
        showToast("Passwords do not match.", "danger");
        return;
      }
      
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerText = "Creating account...";

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput,
            email: emailInput,
            password: passwordInput
          })
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || "Signup failed.");
        }

        showToast("Account created successfully! Redirecting to login...", "success");
        
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1500);

      } catch (err) {
        showToast(err.message, "danger");
        submitBtn.disabled = false;
        submitBtn.innerText = "Sign Up";
      }
    });
  </script>
</body>
</html>
